# ══════════════════════════════════════════════════════════════════════════════
# Character-Websites — Local Development Docker Compose
# Services: FastAPI + Redis + Celery Worker + Nginx
# Database: Supabase (remote) — no local PostgreSQL service needed
# ══════════════════════════════════════════════════════════════════════════════

version: "3.9"

services:

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cw_redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-devredispass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-devredispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cw_network

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: cw_api
    restart: unless-stopped
    env_file:
      - .env
      - .env.local
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD:-devredispass}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-devredispass}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-devredispass}@redis:6379/2
      APP_ENV: development
      DEBUG: "true"
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --log-level info
      --reload
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app:ro  # hot reload in dev
    networks:
      - cw_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Celery Worker (analysis queue) ────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: cw_celery_worker
    restart: unless-stopped
    env_file:
      - .env
      - .env.local
    environment:
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      REDIS_URL: redis://:${REDIS_PASSWORD:-devredispass}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-devredispass}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-devredispass}@redis:6379/2
    command: >
      celery -A app.jobs.celery_app:celery_app worker
      --loglevel=info
      --concurrency=2
      --queues=analysis,webhooks,default
      --hostname=worker@%h
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - cw_network
    healthcheck:
      test: ["CMD", "celery", "-A", "app.jobs.celery_app:celery_app", "inspect", "ping"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s

  # ── Celery Flower (monitoring UI) ─────────────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: cw_flower
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-devredispass}@redis:6379/1
    command: >
      celery -A app.jobs.celery_app:celery_app flower
      --port=5555
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-flowerpass}
    ports:
      - "5555:5555"
    depends_on:
      - redis
    networks:
      - cw_network

  # ── Nginx (dev proxy) ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: cw_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    networks:
      - cw_network


volumes:
  redis_data:
  nginx_logs:


networks:
  cw_network:
    driver: bridge
