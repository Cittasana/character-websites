# ══════════════════════════════════════════════════════════════════════════════
# Nginx configuration for Character-Websites
# - Wildcard subdomain routing → Next.js frontend
# - SSL termination
# - Upstream to FastAPI backend
# - Rate limiting (per subdomain + per IP)
# ══════════════════════════════════════════════════════════════════════════════

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────
    log_format main_json escape=json
        '{'
            '"time": "$time_iso8601",'
            '"remote_addr": "$remote_addr",'
            '"method": "$request_method",'
            '"uri": "$request_uri",'
            '"status": $status,'
            '"body_bytes_sent": $body_bytes_sent,'
            '"request_time": $request_time,'
            '"http_referrer": "$http_referer",'
            '"http_user_agent": "$http_user_agent",'
            '"host": "$host"'
        '}';

    access_log /var/log/nginx/access.log main_json;

    # ── Performance ───────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # ── Gzip ─────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml application/json
        application/javascript application/xml+rss
        application/atom+xml image/svg+xml;

    # ── Rate Limiting Zones ───────────────────────────────────────────────
    # General: 1000 req/hr per subdomain (burst 100)
    limit_req_zone $host zone=per_subdomain:20m rate=16r/m;
    # Upload routes: 100 req/hr per IP (burst 10)
    limit_req_zone $binary_remote_addr zone=upload_zone:10m rate=2r/m;
    # API: general per-IP rate limiting
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=60r/m;

    limit_req_status 429;
    limit_conn_status 429;

    # ── Connection limiting ───────────────────────────────────────────────
    limit_conn_zone $binary_remote_addr zone=conn_zone:10m;

    # ── Upstreams ─────────────────────────────────────────────────────────
    upstream fastapi_backend {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    upstream nextjs_frontend {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    # ══════════════════════════════════════════════════════════════════════
    # HTTP → HTTPS redirect
    # ══════════════════════════════════════════════════════════════════════
    server {
        listen 80;
        listen [::]:80;
        server_name characterwebsites.com *.characterwebsites.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ══════════════════════════════════════════════════════════════════════
    # Main API + App — characterwebsites.com
    # ══════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name characterwebsites.com www.characterwebsites.com;

        # ── SSL ───────────────────────────────────────────────────────────
        ssl_certificate /etc/letsencrypt/live/characterwebsites.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/characterwebsites.com/privkey.pem;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_stapling on;
        ssl_stapling_verify on;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── Security Headers ──────────────────────────────────────────────
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ── File upload size limits ───────────────────────────────────────
        client_max_body_size 55M;  # 50MB voice + overhead
        client_body_timeout 300s;

        # ── API routes → FastAPI ──────────────────────────────────────────
        location /api/ {
            limit_req zone=api_zone burst=30 nodelay;
            limit_conn conn_zone 20;

            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Upload endpoints: stricter rate limit
            location /api/upload/ {
                limit_req zone=upload_zone burst=10 nodelay;
                client_max_body_size 55M;
                proxy_pass http://fastapi_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_read_timeout 300s;
                proxy_send_timeout 300s;
            }
        }

        location /health {
            proxy_pass http://fastapi_backend;
            access_log off;
        }

        # ── Everything else → Next.js ─────────────────────────────────────
        location / {
            limit_req zone=per_subdomain burst=50 nodelay;
            proxy_pass http://nextjs_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ══════════════════════════════════════════════════════════════════════
    # Wildcard subdomains — *.characterwebsites.com → Next.js frontend
    # Each subdomain corresponds to a user's personal website
    # ══════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name ~^(?<subdomain>[a-z0-9-]+)\.characterwebsites\.com$;

        # ── Wildcard SSL ──────────────────────────────────────────────────
        # Requires a wildcard cert (*.characterwebsites.com)
        ssl_certificate /etc/letsencrypt/live/characterwebsites.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/characterwebsites.com/privkey.pem;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_stapling on;
        ssl_stapling_verify on;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;  # allow iframe embedding for previews
        add_header X-Content-Type-Options "nosniff" always;

        # ── Rate Limit — 1000 req/hr per subdomain ────────────────────────
        limit_req zone=per_subdomain burst=100 nodelay;
        limit_conn conn_zone 50;

        # Pass subdomain to Next.js via header for routing
        proxy_set_header X-Subdomain $subdomain;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location / {
            proxy_pass http://nextjs_frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Next.js static assets — cache aggressively
        location /_next/static/ {
            proxy_pass http://nextjs_frontend;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
