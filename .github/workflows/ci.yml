name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Backend: FastAPI + pytest + coverage
  # ─────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (pytest + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      ANTHROPIC_API_KEY: test-anthropic-key
      REDIS_URL: redis://localhost:6379/15
      CELERY_BROKER_URL: redis://localhost:6379/15
      CELERY_RESULT_BACKEND: redis://localhost:6379/15
      APP_ENV: test
      DEBUG: "true"
    steps:
      - uses: actions/checkout@v6

      - name: Install system deps (libmagic, ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagic1 ffmpeg

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov httpx

      - name: Run pytest with coverage
        run: |
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=40 \
            -W ignore::DeprecationWarning

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────
  # Omi integration layer: pytest + coverage
  # ─────────────────────────────────────────────────────────────────────────
  omi:
    name: Omi (pytest + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: omi
    env:
      PYTHONDONTWRITEBYTECODE: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      BACKEND_API_URL: http://localhost:8000
      OMI_APP_ID: test-app-id
      OMI_CLIENT_ID: test-client-id
      OMI_CLIENT_SECRET: test-client-secret
      OMI_OAUTH_REDIRECT_URI: http://localhost/api/omi/callback
    steps:
      - uses: actions/checkout@v6

      - name: Install system deps (ffmpeg, libsndfile)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: omi/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Generate Fernet key for tests
        run: |
          echo "TEMP_BUFFER_ENCRYPTION_KEY=$(python -c 'from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())')" >> $GITHUB_ENV

      - name: Run pytest with coverage
        run: |
          pytest \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=30 \
            -W ignore::DeprecationWarning

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: omi-coverage
          path: omi/coverage.xml
          if-no-files-found: ignore

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend: Next.js — typecheck, lint, build
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      NEXT_PUBLIC_API_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────
  # Aggregate gate — required check for branch protection
  # ─────────────────────────────────────────────────────────────────────────
  ci-passed:
    name: CI passed
    needs: [backend, omi, frontend]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ needs.backend.result }}" != "success" ] || \
             [ "${{ needs.omi.result }}" != "success" ] || \
             [ "${{ needs.frontend.result }}" != "success" ]; then
            echo "One or more required jobs failed."
            exit 1
          fi
          echo "All required jobs passed."
